version: 0.2

env:
  variables:
    SENTRY_ORG: "therapybillai"
    ECR_REPO: "773320320189.dkr.ecr.us-east-1.amazonaws.com/therapybill-app"
    DOCKER_BUILDKIT: "1"

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 773320320189.dkr.ecr.us-east-1.amazonaws.com
      # Generate unique release ID for Sentry error tracking
      - export SENTRY_RELEASE="therapybill-$(date +%Y%m%d-%H%M%S)"
      - echo "Release ID:" $SENTRY_RELEASE
      # Git SHA — written into source.zip by the deploy pipeline so /api/health can report it.
      # Defaults to "unknown" for ad-hoc builds that skipped the deploy script.
      - export RELEASE_SHA=$(cat .release-sha 2>/dev/null || echo "unknown")
      - echo "Release SHA:" $RELEASE_SHA
      # Create a buildx builder backed by the docker-container driver. That driver is
      # required to export/import a registry-backed layer cache (--cache-to/--cache-from);
      # the default "docker" driver cannot. mode=max (set in the build phase) caches ALL
      # multi-stage layers — including the builder/`npm ci` stage — across CodeBuild runs,
      # which is the bulk of the build time.
      - echo Setting up Docker buildx...
      - docker buildx create --use --name tbbuilder --driver docker-container || docker buildx use tbbuilder
      - docker buildx inspect --bootstrap
  build:
    commands:
      - echo Building Docker image...
      # --load brings the built image into the local docker daemon so the existing
      # post_build steps (source-map extraction via `docker create`, then push) keep
      # working unchanged. The cross-run layer cache lives at the :buildcache* ECR tags.
      - >-
        docker buildx build
        --build-arg SENTRY_RELEASE=$SENTRY_RELEASE
        --build-arg RELEASE_SHA=$RELEASE_SHA
        --target production
        --cache-from type=registry,ref=$ECR_REPO:buildcache
        --cache-to type=registry,ref=$ECR_REPO:buildcache,mode=max
        --load
        -t therapybill-app:latest .
      - docker tag therapybill-app:latest $ECR_REPO:latest
      - echo Building migrate image...
      # Imports the shared base + npm-ci layers from the production build's cache, and
      # keeps its own cache tag for the drizzle-kit dev-deps layer.
      - >-
        docker buildx build
        --target migrate
        --cache-from type=registry,ref=$ECR_REPO:buildcache
        --cache-from type=registry,ref=$ECR_REPO:buildcache-migrate
        --cache-to type=registry,ref=$ECR_REPO:buildcache-migrate,mode=max
        --load
        -t therapybill-app:migrate .
      - docker tag therapybill-app:migrate $ECR_REPO:migrate
  post_build:
    commands:
      - echo Pushing Docker images...
      - docker push $ECR_REPO:latest
      - docker push $ECR_REPO:migrate
      # Upload source maps to Sentry (requires SENTRY_AUTH_TOKEN in Secrets Manager)
      - |
        SENTRY_AUTH_TOKEN=$(aws secretsmanager get-secret-value --secret-id therapybill/sentry-auth-token --region us-east-1 --query SecretString --output text 2>/dev/null || echo "")
        if [ -n "$SENTRY_AUTH_TOKEN" ]; then
          echo "Uploading source maps to Sentry (release: $SENTRY_RELEASE)..."
          # Extract source maps from the Docker image
          docker create --name sourcemap-extract therapybill-app:latest true 2>/dev/null || true
          mkdir -p /tmp/sourcemaps/server /tmp/sourcemaps/client
          docker cp sourcemap-extract:/app/dist/index.js.map /tmp/sourcemaps/server/ 2>/dev/null || true
          docker cp sourcemap-extract:/app/dist/public/ /tmp/sourcemaps/client/ 2>/dev/null || true
          docker rm sourcemap-extract 2>/dev/null || true
          # Install Sentry CLI and upload to both projects
          npm install -g @sentry/cli 2>/dev/null
          export SENTRY_AUTH_TOKEN
          # Create release in both projects
          sentry-cli releases new "$SENTRY_RELEASE" --org "$SENTRY_ORG" --project node-express --project javascript-react 2>/dev/null || true
          # Upload server source maps to node-express project
          sentry-cli releases files "$SENTRY_RELEASE" upload-sourcemaps /tmp/sourcemaps/server/ --org "$SENTRY_ORG" --project node-express 2>/dev/null || true
          # Upload client source maps to javascript-react project
          sentry-cli releases files "$SENTRY_RELEASE" upload-sourcemaps /tmp/sourcemaps/client/ --org "$SENTRY_ORG" --project javascript-react 2>/dev/null || true
          sentry-cli releases finalize "$SENTRY_RELEASE" --org "$SENTRY_ORG" --project node-express --project javascript-react 2>/dev/null || true
          echo "Source maps uploaded to both projects"
        else
          echo "SENTRY_AUTH_TOKEN not found — skipping source map upload (errors will still be tracked)"
        fi
      - echo Build completed
