# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: therapy-billing-app
    runtime: node
    region: oregon
    plan: free
    buildCommand: rm -rf node_modules && npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PHI_ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_PORT
        value: "587"
