name: Production Health Check

on:
  schedule:
    # Every 6 hours for ongoing coverage, plus 11:00 UTC (7 AM ET) as the
    # pre-demo readiness check that replaces the laptop-bound Claude
    # Desktop routine that was being "Skipped" when the Mac was asleep.
    - cron: '0 */6 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]
    paths:
      - '.github/workflows/health-check.yml'

env:
  PROD_URL: https://app.therapybillai.com

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Production Health
        id: health
        run: |
          response=$(curl -s -w "\n%{http_code}" "$PROD_URL/api/health")
          status=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          if [ "$status" = "200" ]; then
            echo "✅ Production is healthy"
            echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"
          else
            echo "❌ Health check returned HTTP $status"
            echo "$body"
            exit 1
          fi

      - name: Test Demo Login (save session cookie)
        run: |
          # -c writes Set-Cookie headers to cookies.txt so the patients
          # and Blanche steps below can reuse the demo session.
          response=$(curl -s -w "\n%{http_code}" -c cookies.txt -X POST "$PROD_URL/api/demo-login" \
            -H "Content-Type: application/json" \
            -d '{"email":"demo@therapybill.com","password":"demo1234"}')
          status=$(echo "$response" | tail -1)

          if [ "$status" = "200" ]; then
            echo "✅ Demo login works"
          else
            echo "❌ Demo login returned HTTP $status"
            echo "$response" | head -1
            exit 1
          fi

      - name: Test Patients API returns demo data (>= 6 patients)
        run: |
          # Demo readiness signal — if the demo account shows 0 patients,
          # a live customer demo will look broken. The seed expects 6+.
          body=$(curl -s -b cookies.txt "$PROD_URL/api/patients")
          count=$(echo "$body" | python3 -c "import sys, json; d=json.load(sys.stdin); print(len(d) if isinstance(d, list) else len(d.get('patients', [])))" 2>/dev/null || echo "0")
          echo "Patient count: $count"
          if [ "$count" -ge 6 ]; then
            echo "✅ Demo patients present ($count)"
          else
            echo "❌ Expected >= 6 demo patients but found $count"
            echo "First 500 chars of response:"
            echo "$body" | head -c 500
            exit 1
          fi

      - name: Test Blanche assistant responds
        run: |
          # Smallest possible turn — just "hello", no tool use. Confirms the
          # Anthropic API key, rate-limit middleware, and assistant route
          # are all wired up. We don't assert on response content; we only
          # require a 200 with a non-empty `response` field.
          body=$(curl -s -b cookies.txt -X POST "$PROD_URL/api/ai/assistant" \
            -H "Content-Type: application/json" \
            -d '{"message":"hello","conversationHistory":[]}')
          has_response=$(echo "$body" | python3 -c "import sys, json; d=json.load(sys.stdin); print('yes' if isinstance(d.get('response'), str) and len(d['response']) > 0 else 'no')" 2>/dev/null || echo "no")
          if [ "$has_response" = "yes" ]; then
            echo "✅ Blanche responded"
          else
            echo "❌ Blanche did not respond"
            echo "First 500 chars of response:"
            echo "$body" | head -c 500
            exit 1
          fi

      - name: Test Landing Page
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL")
          if [ "$status" = "200" ]; then
            echo "✅ Landing page loads"
          else
            echo "❌ Landing page returned HTTP $status"
            exit 1
          fi

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Production Health Check Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Production Health Check Failed

            **Time:** ${new Date().toISOString()}
            **URL:** ${process.env.PROD_URL}

            Please check the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.

            ### Quick Checks:
            - [ ] Is the ECS service running?
            - [ ] Is RDS accessible?
            - [ ] Check CloudWatch logs
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'production-alert'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['production-alert', 'bug']
              });
            }
